      // RENDER PERFIL
      function renderPerfil() {
        return <PerfilView />;
      }

      function PerfilView() {
        const [nome, setNome] = useState(user?.nome || "");
        const [senha, setSenha] = useState("");
        const [loading, setLoading] = useState(false);

        async function handleSave() {
          setLoading(true);
          const updates = { nome };
          if (senha) updates.senha = senha; // Se fosse enviar senha precisa do backend suportar

          try {
            const r = await fetch(`${API}/auth/usuarios/${user.id}`, {
              method: "PATCH",
              headers: H(),
              body: JSON.stringify(updates)
            });
            if (r.ok) {
              toast("✅ Perfil atualizado com sucesso!");
              const newUser = { ...user, nome };
              setUser(newUser);
              localStorage.setItem("vp_user", JSON.stringify(newUser));
              setSenha("");
            } else {
              toast("❌ Erro ao salvar");
            }
          } catch (e) {
            toast("❌ Erro de conexão");
          }
          setLoading(false);
        }

        return (
          <div style={{ flex: 1, overflowY: "auto", padding: 32, background: "#070b14" }}>
            <div style={{ maxWidth: 600, margin: "0 auto" }}>
              <div style={{ fontSize: 28, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-.5px", marginBottom: 8 }}>Meu Perfil</div>
              <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 36 }}>Gerencie seus dados pessoais.</div>

              <div style={{ background: "#0c1220", border: "1px solid #1e2d45", borderRadius: 16, padding: 32 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 32 }}>
                  <div style={{ width: 80, height: 80, borderRadius: 20, background: "linear-gradient(135deg, #3b82f6, #1d4ed8)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 800, boxShadow: "0 10px 25px rgba(59,130,246,0.3)" }}>
                    {initials(user?.nome)}
                  </div>
                  <div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: "#f1f5f9" }}>{user?.nome}</div>
                    <div style={{ fontSize: 13, color: "#64748b", fontFamily: "'JetBrains Mono',monospace", marginTop: 4 }}>{user?.email}</div>
                    <div style={{ display: "inline-block", background: user?.role === "admin" ? "#d4a84322" : "#3b82f622", color: user?.role === "admin" ? "#d4a843" : "#3b82f6", fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 50, marginTop: 8 }}>
                      {user?.role === "admin" ? "Administrador" : "Atendente"}
                    </div>
                  </div>
                </div>

                <div style={{ display: "grid", gap: 20 }}>
                  <div>
                    <label style={{ fontSize: 11, color: "#64748b", fontFamily: "'JetBrains Mono',monospace", display: "block", marginBottom: 8, letterSpacing: ".05em" }}>NOME COMPLETO</label>
                    <input type="text" className="form-input" value={nome} onChange={e => setNome(e.target.value)} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, color: "#64748b", fontFamily: "'JetBrains Mono',monospace", display: "block", marginBottom: 8, letterSpacing: ".05em" }}>E-MAIL DE ACESSO</label>
                    <input type="email" className="form-input" defaultValue={user?.email} disabled style={{ opacity: 0.6 }} />
                  </div>
                  <div style={{ borderTop: "1px solid #1e2d45", paddingTop: 20, marginTop: 10 }}>
                    <label style={{ fontSize: 11, color: "#64748b", fontFamily: "'JetBrains Mono',monospace", display: "block", marginBottom: 8, letterSpacing: ".05em" }}>NOVA SENHA</label>
                    <input type="password" value={senha} onChange={e => setSenha(e.target.value)} className="form-input" placeholder="Digite apenas se quiser alterar..." />
                  </div>
                  <button disabled={loading} className="btn-gold" style={{ marginTop: 10, height: 48 }} onClick={handleSave}>{loading ? "SALVANDO..." : "SALVAR ALTERAÇÕES"}</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function renderClientes() {

        const STATUS_TABS = [
          { id: "todos", label: "Todos", color: "#d4a843" },
          { id: "ativo", label: "✅ Ativos", color: "#10b981" },
          { id: "trial", label: "⏳ Trial", color: "#f59e0b" },
          { id: "suspenso", label: "🔒 Suspensos", color: "#ef4444" },
          { id: "cancelado", label: "❌ Cancelados", color: "#6b7280" },
        ];

        const empresasFiltradas = empresas.filter(e => {
          const matchStatus = filtroStatus === "todos" || (e.status || "ativo") === filtroStatus;
          const matchBusca = !busca || e.nome?.toLowerCase().includes(busca.toLowerCase()) || e.admin?.email?.toLowerCase().includes(busca.toLowerCase());
          return matchStatus && matchBusca;
        });

        async function excluirEmpresa(emp) {
          const confirmMsg = `⚠️ EXCLUIR PERMANENTEMENTE?\n\nEmpresa: ${emp.nome}\nAdmin: ${emp.admin?.email || "—"}\n\nTODOS os dados (usuários, conversas, canais) serão apagados.\nEssa ação é IRREVERSÍVEL!\n\nDigite "EXCLUIR" para confirmar:`;
          const resp = window.prompt(confirmMsg);
          if (resp !== "EXCLUIR") return toast("❌ Excluído cancelado — confirmação incorreta.");
          try {
            const r = await fetch(`${API}/admin/empresas/${emp.id}`, { method: "DELETE", headers: H() });
            const d = await r.json();
            if (r.ok) { toast("🗑️ Empresa excluída com sucesso!"); loadEmpresas(); }
            else toast(`❌ ${d.erro || "Erro ao excluir"}`);
          } catch (e) { toast("❌ Erro de conexão"); }
        }

        const statusInfo = {
          "ativo": { label: "Ativo", color: "#10b981", bg: "#10b98122", icon: "✅" },
          "trial": { label: "Trial", color: "#f59e0b", bg: "#f59e0b22", icon: "⏳" },
          "suspenso": { label: "Suspenso", color: "#ef4444", bg: "#ef444422", icon: "🔒" },
          "cancelado": { label: "Cancelado", color: "#6b7280", bg: "#6b728022", icon: "❌" },
        };

        return (
          <div style={{ flex: 1, overflowY: "auto", padding: 32, background: "#070b14" }}>
            {/* HEADER */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28, flexWrap: "wrap", gap: 16 }}>
              <div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-.5px" }}>Gestão de Clientes</div>
                <div style={{ fontSize: 12, color: "#64748b", marginTop: 4, fontFamily: "'JetBrains Mono',monospace" }}>APENAS SUPER ADMIN · {empresas.length} empresa{empresas.length !== 1 ? "s" : ""} cadastrada{empresas.length !== 1 ? "s" : ""}</div>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button className="btn-ghost" style={{ padding: "10px 16px", fontSize: 13 }} onClick={loadEmpresas}>🔄 Atualizar</button>
                <button className="btn-gold" style={{ padding: "10px 20px", fontSize: 13 }} onClick={() => setModal("novo-cliente")}>➕ Novo Cliente</button>
              </div>
            </div>

            {/* STATS */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 14, marginBottom: 28 }}>
              {[
                { label: "Total", value: adminStats?.total_empresas || empresas.length || 0, color: "#f1f5f9", icon: "🏢" },
                { label: "Ativos", value: adminStats?.por_status?.ativo || empresas.filter(e => !e.status || e.status === "ativo").length || 0, color: "#10b981", icon: "✅" },
                { label: "Trial", value: adminStats?.por_status?.trial || empresas.filter(e => e.status === "trial").length || 0, color: "#f59e0b", icon: "⏳" },
                { label: "Suspensos", value: adminStats?.por_status?.suspenso || empresas.filter(e => e.status === "suspenso").length || 0, color: "#ef4444", icon: "🔒" },
                { label: "Usuários", value: adminStats?.total_usuarios || 0, color: "#3b82f6", icon: "👥" },
              ].map(s => (
                <div key={s.label} style={{ background: "#0c1220", border: "1px solid #1e2d45", borderRadius: 12, padding: "16px 20px", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ fontSize: 20 }}>{s.icon}</div>
                  <div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: s.color, lineHeight: 1 }}>{s.value}</div>
                    <div style={{ fontSize: 11, color: "#64748b", marginTop: 2, fontWeight: 600 }}>{s.label}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* FILTROS + BUSCA */}
            <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
              <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="🔍 Buscar empresa ou email..." style={{ background: "#0c1220", border: "1px solid #1e2d45", borderRadius: 10, padding: "10px 16px", color: "#f1f5f9", fontSize: 13, flex: 1, minWidth: 200, outline: "none" }} />
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

                  <button key={t.id} onClick={() => setFiltroStatus(t.id)} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, border: `1px solid ${filtroStatus === t.id ? t.color + "88" : t.color + "33"}`, background: filtroStatus === t.id ? t.color + "22" : "transparent", color: filtroStatus === t.id ? t.color : "#64748b", cursor: "pointer", transition: "all .15s" }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* LISTA DE EMPRESAS */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {empresasFiltradas.map(emp => {
                let metadata = {};
                try { if (emp.observacao && emp.observacao.startsWith("{")) metadata = JSON.parse(emp.observacao); } catch (e) { }
                const st = statusInfo[emp.status || "ativo"] || statusInfo["ativo"];
                const isDesativada = emp.status === "suspenso" || emp.status === "cancelado";

                return (
                  <div key={emp.id} style={{ background: "#0c1220", border: `1px solid ${isDesativada ? "#ef444420" : "#1e2d45"}`, borderRadius: 14, padding: 20, opacity: isDesativada ? 0.75 : 1, transition: "all .2s" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 16, flexWrap: "wrap" }}>
                      {/* AVATAR */}
                      <div style={{ width: 48, height: 48, borderRadius: 13, background: st.bg, border: `1px solid ${st.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 800, color: st.color, flexShrink: 0 }}>
                        {(emp.nome || "?").charAt(0).toUpperCase()}
                      </div>

                      {/* DADOS */}
                      <div style={{ flex: 1, minWidth: 200 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5, flexWrap: "wrap" }}>

                        {emp.admin ? (
                          <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 5 }}>

                        ) : (
                          <div style={{ fontSize: 12, color: "#ef4444", marginBottom: 5 }}>⚠ Sem administrador vinculado</div>

                        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 11, color: "#64748b" }}>

                          {(emp.documento || metadata.documento) && <span>🪪 CNPJ: <b style={{ color: "#d4a843" }}>{emp.documento || metadata.documento}</b></span>}
                          {(emp.cidade || metadata.cidade) && <span>📍 <b style={{ color: "#94a3b8" }}>{[emp.cidade || metadata.cidade, emp.estado || metadata.estado].filter(Boolean).join(" – ")}</b></span>}
                          <span>👥 <b style={{ color: "#94a3b8" }}>{emp.total_usuarios || 0}</b> usuários</span>
                          <span>📡 <b style={{ color: "#94a3b8" }}>{emp.canais?.length || 0}</b> canais</span>
                          <span>📅 Criado: <b style={{ color: "#94a3b8" }}>{emp.created_at ? new Date(emp.created_at).toLocaleDateString("pt-BR") : "—"}</b></span>
                          {emp.proximo_vencimento && <span style={{ color: new Date(emp.proximo_vencimento + "T00:00") < new Date() ? "#ef4444" : "#f59e0b" }}>⏰ Próximo venc.: <b>{new Date(emp.proximo_vencimento + "T00:00").toLocaleDateString("pt-BR")}</b></span>}
                        </div>
                      </div>

                      {/* AÇÕES */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 7, minWidth: 160, flexShrink: 0 }}>
                        {isDesativada ? (
                          <button onClick={() => atualizarEmpresa(emp.id, { status: "ativo" })} style={{ background: "#10b98115", color: "#10b981", border: "1px solid #10b98140", padding: "8px 12px", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✅ Reativar</button>
                        ) : (
                          <button onClick={() => { if (window.confirm(`🔒 Suspender "${emp.nome}"?\n\nTodos os usuários perderão o acesso.`)) atualizarEmpresa(emp.id, { status: "suspenso" }); }} style={{ background: "#ef444415", color: "#ef4444", border: "1px solid #ef444440", padding: "8px 12px", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>🔒 Suspender</button>
                        )}
                        <select value={emp.plano || "starter"} onChange={e => atualizarEmpresa(emp.id, { plano: e.target.value })} style={{ background: "#070b14", border: "1px solid #1e2d45", borderRadius: 8, padding: "7px 10px", color: "#94a3b8", fontSize: 11, cursor: "pointer" }}>

                          <option value="pro">🚀 Pro — R$497/mês</option>
                          <option value="enterprise">🏢 Enterprise — R$997/mês</option>
                        </select>

                        <button onClick={() => setEditEmpresa(emp)} style={{ background: "transparent", color: "#94a3b8", border: "1px solid #1e2d45", padding: "7px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>✏️ Editar</button>
                        <button onClick={() => excluirEmpresa(emp)} style={{ background: "transparent", color: "#ef4444", border: "1px dashed #ef444433", padding: "7px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>🗑️ Excluir</button>

                        <option value="trial">⏳ Trial / Teste</option>
                        <option value="suspenso">🔒 Suspenso</option>
                        <option value="cancelado">❌ Cancelado</option>

                    <div className="form-group" style={{ marginBottom: 0 }}>

                        <option value="pro">🚀 Pro — R$ 497/mês</option>

                    const r = await fetch(`${API}/auth/usuarios/${editUserForm.id}`, { method: "PATCH", headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` }, body: JSON.stringify(payload) });

                      toast("✅ Salvo com sucesso!");
                      setEditUserForm(null);
                      const r2 = await fetch(`${API}/auth/usuarios`, { headers: { "Authorization": `Bearer ${token}` } });
                      setUsuarios(await r2.json() || []);
                    } else toast("❌ Erro ao salvar");
                  } catch (e) { toast("❌ Erro de conexão"); }

                <button className="btn-ghost" onClick={() => setEditUserForm(null)}>Cancelar</button>
              </div>
            </div>

                        <div key={c.id} style={{ background: "#0c1220", border: `1px solid ${statusColor}33`, borderRadius: 10, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>

                    <div className="form-group">
                      <label className="form-label">Nome da Empresa *</label>
                      <input type="text" className="form-input" value={novoClienteForm.empresaNome} onChange={e => setNovoClienteForm({ ...novoClienteForm, empresaNome: e.target.value })} placeholder="Ex: Prado Solutions SA" />
                    </div>
                    <div className="form-group">
                      <label className="form-label">CNPJ / CPF (Identificador único)</label>
                      <input type="text" className="form-input" value={novoClienteForm.documento} onChange={e => setNovoClienteForm({ ...novoClienteForm, documento: e.target.value })} placeholder="00.000.000/0001-00" />
                    </div>
                    <div className="form-group">
                      <label className="form-label">Telefone / WhatsApp</label>
                      <input type="text" className="form-input" value={novoClienteForm.telefone} onChange={e => setNovoClienteForm({ ...novoClienteForm, telefone: e.target.value })} placeholder="(11) 99999-9999" />
                    </div>
                    <div className="form-group">
                      <label className="form-label">Endereço</label>
                      <input type="text" className="form-input" value={novoClienteForm.endereco} onChange={e => setNovoClienteForm({ ...novoClienteForm, endereco: e.target.value })} placeholder="Rua das Flores, 123" />
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <div className="form-group" style={{ flex: 1 }}>
                        <label className="form-label">CEP</label>
                        <input type="text" className="form-input" value={novoClienteForm.cep} onChange={e => setNovoClienteForm({ ...novoClienteForm, cep: e.target.value })} placeholder="00000-000" />
                      </div>
                      <div className="form-group" style={{ flex: 2 }}>
                        <label className="form-label">Cidade</label>
                        <input type="text" className="form-input" value={novoClienteForm.cidade} onChange={e => setNovoClienteForm({ ...novoClienteForm, cidade: e.target.value })} placeholder="São Paulo" />
                      </div>
                      <div className="form-group" style={{ flex: 1 }}>
                        <label className="form-label">UF</label>
                        <input type="text" className="form-input" value={novoClienteForm.estado} onChange={e => setNovoClienteForm({ ...novoClienteForm, estado: e.target.value.slice(0, 2).toUpperCase() })} placeholder="SP" maxLength={2} />
                      </div>
                    </div>
                  </div>

                  {/* COL 2: ACESSO */}
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#10b981", marginBottom: 10, borderBottom: "1px solid #1e2d45", paddingBottom: 6, letterSpacing: ".08em" }}>🔑 ACESSO DO ADMINISTRADOR</div>
                    <div style={{ background: "#10b98111", border: "1px solid #10b98133", borderRadius: 8, padding: "10px 12px", fontSize: 11, color: "#10b981", marginBottom: 14 }}>
                      Estas credenciais serão entregues ao cliente para o primeiro acesso ao sistema.
                    </div>
                    <div className="form-group">
                      <label className="form-label">Nome Completo do Responsável *</label>
                      <input type="text" className="form-input" value={novoClienteForm.responsavel} onChange={e => setNovoClienteForm({ ...novoClienteForm, responsavel: e.target.value })} placeholder="Ex: Carlos Abade" />
                    </div>
                    <div className="form-group">
                      <label className="form-label">E-mail de Acesso *</label>
                      <input type="email" className="form-input" value={novoClienteForm.email} onChange={e => setNovoClienteForm({ ...novoClienteForm, email: e.target.value })} placeholder="admin@empresa.com" />
                    </div>
                    <div className="form-group">
                      <label className="form-label">Senha Inicial *</label>
                      <input type="text" className="form-input" value={novoClienteForm.senha} onChange={e => setNovoClienteForm({ ...novoClienteForm, senha: e.target.value })} placeholder="Mín. 6 caracteres" />
                    </div>
                    <div style={{ background: "#f59e0b11", border: "1px solid #f59e0b33", borderRadius: 8, padding: "10px 12px", fontSize: 11, color: "#f59e0b", marginTop: 4 }}>
                      ⚠️ Anote ou copie a senha agora — ela não poderá ser recuperada depois.
                    </div>
                  </div>
                </div>

                <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 20, borderTop: "1px solid #1e2d45", paddingTop: 16 }}>
                  <button className="btn-ghost" onClick={() => setModal(null)}>Cancelar</button>
                  <button className="btn-gold" style={{ padding: "0 28px" }} onClick={criarClienteSuperAdmin}>✅ Criar Cliente</button>
                </div>
              </div>
            </div>
          )}



          {modal === "novoCanal" && (
            <div className="modal-bg" onClick={() => { if (["escolha", "form", "meta_form"].includes(qrFlow.step)) setModal(null); }}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 440 }}>

                {/* STEP 0: ESCOLHA DO MÉTODO */}
                {qrFlow.step === "escolha" && (<>
                  <div className="modal-title">Nova Conexão WhatsApp</div>
                  <div className="modal-sub">Escolha a tecnologia para conectar seu novo canal.</div>
                  <div style={{ display: "grid", gap: 16, padding: "10px 0" }}>
                    <div onClick={() => setQrFlow(p => ({ ...p, step: "form" }))} style={{ border: "1px solid #1e2d45", borderRadius: 12, padding: 16, cursor: "pointer", background: "#0c1220" }} className="s-hover">
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                        <div style={{ fontSize: 22 }}>📱</div>
                        <div>
                          <div style={{ fontWeight: 700, color: "#f1f5f9" }}>WhatsApp Padrão (QR Code)</div>
                          <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700 }}>Ecológico via Evolution API</div>
                        </div>
                      </div>
                      <div style={{ fontSize: 12, color: "#94a3b8" }}>Ler código QR na tela e conectar na hora. Ideal para fluxos pequenos, aquecimento ou sem burocracia.</div>
                    </div>

                    <div onClick={() => setQrFlow(p => ({ ...p, step: "meta_form" }))} style={{ border: "1px solid #10b98144", borderRadius: 12, padding: 16, cursor: "pointer", background: "#10b98111" }} className="s-hover">
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                        <div style={{ fontSize: 22 }}>🚀</div>
                        <div>
                          <div style={{ fontWeight: 700, color: "#10b981" }}>Cloud API (Oficial da Meta)</div>
                          <div style={{ fontSize: 11, color: "#10b98155", fontWeight: 700 }}>Servidor Oficial Corporativo</div>
                        </div>
                      </div>
                      <div style={{ fontSize: 12, color: "#94a3b8" }}>Confiabilidade máxima. Conecte pelo Token Permanente para envios em altíssima escala e selo verde.</div>
                    </div>
                  </div>
                  <button className="btn-ghost" onClick={() => setModal(null)}>Cancelar</button>
                </>)}

                {/* STEP META: FORMULÁRIO API OFICIAL */}
                {qrFlow.step === "meta_form" && (<>
                  <div className="modal-title">🚀 Meta Cloud API</div>
                  <div className="modal-sub">Insira as credenciais geradas no painel do Facebook Developers.</div>
                  <div className="form-group">
                    <label className="form-label">Nome de Identificação Inicial</label>
                    <input type="text" className="form-input" placeholder="Ex: Matriz Nível Oficial" value={novoCanal.nome} onChange={e => setNovoCanal(p => ({ ...p, nome: e.target.value }))} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Telefone ID da Meta (Phone ID)</label>
                    <input type="text" className="form-input" placeholder="Ex: 10423..." value={novoCanal.numero_telefone} onChange={e => setNovoCanal(p => ({ ...p, numero_telefone: e.target.value }))} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Token de Acesso Permanente (Bearer)</label>
                    <input type="password" className="form-input" placeholder="EAA..." value={novoCanal.instance_name} onChange={e => setNovoCanal(p => ({ ...p, instance_name: e.target.value }))} />
                  </div>
                  <button className="btn-gold" disabled={qrFlow.loading} style={{ marginTop: 8 }} onClick={async () => {
                    if (!novoCanal.nome) return toast("❌ Informe o nome do canal");
                    if (!novoCanal.numero_telefone || !novoCanal.instance_name) return toast("❌ Preencha as credenciais da API");

                    setQrFlow(p => ({ ...p, loading: true }));
                    try {
                      const r = await fetch(`${API}/canais`, {
                        method: "POST", headers: H(), body: JSON.stringify({
                          nome: novoCanal.nome,
                          tipo: "cloud_api",
                          numero_telefone: novoCanal.numero_telefone,
                          dados_conexao: { phone_number_id: novoCanal.numero_telefone, access_token: novoCanal.instance_name }
                        })
                      });

                      if (r.ok) {
                        toast("✅ Meta Cloud API conectada e pronta!");
                        loadCanais();
                        setModal(null);
                      } else {
                        const eD = await r.json().catch(() => ({}));
                        toast(`❌ Erro Servidor: ${eD.erro || r.statusText || "ao conectar canal oficial."}`);
                      }
                    } catch (e) { toast(`❌ Erro de conexão: ${e.message}`); }
                    finally { setQrFlow(p => ({ ...p, loading: false })); }
                  }}>
                    {qrFlow.loading ? "Vinculando..." : "Conectar Meta Oficial"}
                  </button>
                  <button className="btn-ghost" onClick={() => setQrFlow(p => ({ ...p, step: "escolha" }))}>Voltar</button>
                </>)}

                {/* STEP 1: FORMULÁRIO (EVOLUTION) */}
                {qrFlow.step === "form" && (<>
                  <div className="modal-title">📱 Conectar WhatsApp</div>
                  <div className="modal-sub">Configure um novo número em segundos. Sem configurações técnicas.</div>
                  <div className="form-group">
                    <label className="form-label">Nome do Canal</label>
                    <input type="text" className="form-input" placeholder="Ex: Vendas, Suporte, Filial SP" value={novoCanal.nome} onChange={e => setNovoCanal(p => ({ ...p, nome: e.target.value }))} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Número do WhatsApp (opcional)</label>
                    <input type="text" className="form-input" placeholder="+5511999999999" value={novoCanal.numero_telefone} onChange={e => setNovoCanal(p => ({ ...p, numero_telefone: e.target.value }))} />
                    <div style={{ fontSize: 10, color: "#64748b", marginTop: 5 }}>Para identificação apenas. O QR code será gerado automaticamente.</div>
                  </div>
                  <button className="btn-gold" disabled={qrFlow.loading} style={{ marginTop: 8 }} onClick={async () => {
                    if (!novoCanal.nome) return toast("❌ Informe o nome do canal");
                    setQrFlow(p => ({ ...p, loading: true, step: "form" }));
                    try {
                      const r = await fetch(`${API}/canais/criar-instancia`, { method: "POST", headers: H(), body: JSON.stringify({ nome: novoCanal.nome, numero_telefone: novoCanal.numero_telefone }) });
                      const d = await r.json();
                      if (!r.ok) return toast(`❌ ${d.erro || "Erro ao criar canal"}`);
                      // Inicia polling de status
                      let cd = 60;
                      const timer = setInterval(() => { cd--; setQrFlow(p => ({ ...p, countdown: cd })); if (cd <= 0) clearInterval(timer); }, 1000);
                      setQrFlow({ step: "qrcode", loading: false, instanceName: d.instanceName, qrcode: d.qrcode || "", canalId: d.canalId, countdown: 60, _timer: timer });
                      // Poll status a cada 4s
                      const poll = setInterval(async () => {
                        try {
                          const s = await fetch(`${API}/canais/${d.instanceName}/status`, { headers: H() });
                          const sd = await s.json();
                          if (sd.connected) {
                            clearInterval(poll);
                            clearInterval(timer);
                            setQrFlow(p => ({ ...p, step: "connected" }));
                            loadCanais();
                            toast("✅ WhatsApp conectado com sucesso!");
                          }
                        } catch (e) { }
                      }, 4000);
                    } catch (e) { toast("❌ Erro de conexão"); }
                    finally { setQrFlow(p => ({ ...p, loading: false })); }
                  }}>{qrFlow.loading ? "Aguarde..." : "Gerar QR Code →"}</button>
                  <button className="btn-ghost" onClick={() => setModal(null)}>Cancelar</button>
                </>)}

                {/* STEP 2: QR CODE */}
                {qrFlow.step === "qrcode" && (<>
                  <div className="modal-title">📲 Escaneie o QR Code</div>
                  <div className="modal-sub">Abra o WhatsApp → Dispositivos conectados → Conectar dispositivo</div>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, padding: "8px 0 16px" }}>
                    {qrFlow.qrcode ? (
                      <img src={qrFlow.qrcode.startsWith("data:") ? qrFlow.qrcode : `data:image/png;base64,${qrFlow.qrcode}`} alt="QR Code" style={{ width: 220, height: 220, borderRadius: 12, border: "2px solid #d4a84344", background: "#fff", padding: 8 }} />
                    ) : (
                      <div style={{ width: 220, height: 220, borderRadius: 12, border: "1px solid #1e2d45", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8 }}>
                        <div style={{ fontSize: 24 }}>⏳</div>
                        <div style={{ fontSize: 12, color: "#64748b" }}>Carregando QR Code...</div>
                        <button className="btn-ghost" style={{ fontSize: 11, padding: "6px 14px", marginTop: 4 }} onClick={async () => {
                          const r = await fetch(`${API}/canais/${qrFlow.instanceName}/qrcode`, { headers: H() });
                          const d = await r.json();
                          if (d.qrcode) setQrFlow(p => ({ ...p, qrcode: d.qrcode, countdown: 60 }));
                        }}>🔄 Gerar QR Code</button>
                      </div>
                    )}
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 4 }}>Aguardando leitura...</div>
                      <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: qrFlow.countdown <= 15 ? "#ef4444" : "#d4a843" }}>{qrFlow.countdown}s</div>
                      {qrFlow.countdown <= 0 && <button className="btn-ghost" style={{ fontSize: 11, marginTop: 8 }} onClick={async () => {
                        const r = await fetch(`${API}/canais/${qrFlow.instanceName}/qrcode`, { headers: H() });
                        const d = await r.json();
                        if (d.qrcode) setQrFlow(p => ({ ...p, qrcode: d.qrcode, countdown: 60 }));
                      }}>🔄 Renovar QR Code</button>}
                    </div>
                  </div>
                  <button className="btn-ghost" onClick={() => { setModal(null); setQrFlow({ step: "form", loading: false, instanceName: "", qrcode: "", canalId: null, countdown: 60 }); }}>Fechar</button>
                </>)}

                {/* STEP 3: CONECTADO */}
                {qrFlow.step === "connected" && (<>
                  <div style={{ textAlign: "center", padding: "20px 0" }}>
                    <div style={{ fontSize: 56, marginBottom: 12 }}>✅</div>
                    <div className="modal-title">WhatsApp Conectado!</div>
                    <div className="modal-sub">O canal <b>{novoCanal.nome}</b> está ativo e pronto para receber mensagens.</div>
                    <div style={{ marginTop: 12, padding: "10px 16px", background: "#10b98122", border: "1px solid #10b98133", borderRadius: 8, fontSize: 12, color: "#10b981", fontFamily: "'JetBrains Mono',monospace" }}>{qrFlow.instanceName}</div>
                  </div>
                  <button className="btn-gold" onClick={() => { setModal(null); setQrFlow({ step: "form", loading: false, instanceName: "", qrcode: "", canalId: null, countdown: 60 }); setNovoCanal({ nome: "", tipo: "evolution", numero_telefone: "", instance_name: "" }); }}>Concluir 🎉</button>
                </>)}

              </div>
            </div>
          )}

          {modal === "transfer" && conv && (
            <div className="modal-bg" onClick={() => setModal(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-title">Transferir Conversa</div>
                <div className="modal-sub">Mover {conv.nome} para outro setor</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {SETORES.filter(s => s.id !== "todos").map(s => (
                    <button key={s.id} onClick={() => { setSetor(conv.numero, s.id); setModal(null); }} style={{ background: conv.setor === s.id ? "#172236" : "transparent", border: "1px solid " + s.color + "44", borderRadius: 8, padding: "10px 14px", color: s.color, fontSize: 12, fontWeight: 600, textAlign: "left", cursor: "pointer" }}>
                      {s.emoji} {s.name} {conv.setor === s.id && "← atual"}
                    </button>
                  ))}
                </div>
                <button className="btn-ghost" onClick={() => setModal(null)}>Cancelar</button>
              </div>
            </div>
          )}

          {modal === "assign" && conv && (
            <div className="modal-bg" onClick={() => setModal(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-title">Atribuir Conversa</div>
                <div className="modal-sub">Selecione um atendente</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {usuarios.filter(u => u.ativo).map(u => (
                    <button key={u.id} onClick={() => { toast(`✅ Atribuído a ${u.nome}`); setModal(null); }} style={{ background: "transparent", border: "1px solid #1e2d45", borderRadius: 8, padding: "10px 14px", color: "#94a3b8", fontSize: 12, textAlign: "left", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 28, height: 28, borderRadius: 8, background: "#172236", color: "#60a5fa", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700 }}>{initials(u.nome)}</div>
                      <div><div style={{ color: "#f1f5f9", fontWeight: 500 }}>{u.nome}</div><div style={{ fontSize: 10, color: "#4a5568" }}>{u.role} · {u.setor}</div></div>
                    </button>
                  ))}
                </div>
                <button className="btn-ghost" onClick={() => setModal(null)}>Cancelar</button>
              </div>
            </div>
          )}

          {notify && <div className="notify">{notify}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
